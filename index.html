<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Fraud Detector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-blobs"></div>
  <div class="container">
    <header>
      <h1>🔍 QR Fraud Detector</h1>
      <p class="subtitle">Scan or paste a link to verify its safety</p>
    </header>

    <div id="reader"></div>

    <div class="input-group">
      <input type="text" id="qrInput" placeholder="https://example.com" />
      <button onclick="checkLink(document.getElementById('qrInput').value)">Check Safety</button>
    </div>

    <div id="result-card" class="hidden">
      <h2 id="result"></h2>
      <div class="progress-bar">
        <div id="progress"></div>
      </div>
      <p id="fraudLog"></p>
    </div>
  </div>

  <div id="history-container" class="container history-section"></div>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="script.js"></script>
</body>
</html>
